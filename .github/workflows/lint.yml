name: 语法检查

on:
  workflow_dispatch:
    inputs:
      scope:
        description: '检查范围'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

jobs:
  frontend-lint:
    name: 前端语法检查
    runs-on: ubuntu-latest
    if: ${{ inputs.scope == 'all' || inputs.scope == 'frontend' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: ESLint 检查
        run: npm run lint

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

  backend-lint:
    name: 后端语法检查
    runs-on: ubuntu-latest
    if: ${{ inputs.scope == 'all' || inputs.scope == 'backend' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: ESLint 检查
        run: npm run lint

      - name: TypeScript 类型检查
        run: npx tsc --noEmit
