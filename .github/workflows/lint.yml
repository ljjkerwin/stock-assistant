name: 语法检查

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/tsconfig*.json'
      - 'frontend/.eslintrc*'
      - 'backend/src/**'
      - 'backend/package.json'
      - 'backend/tsconfig*.json'
      - 'backend/.eslintrc*'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
    inputs:
      scope:
        description: '检查范围'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

jobs:
  lint:
    name: 语法与类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 前端 ESLint 检查
        if: github.event_name == 'pull_request' || inputs.scope == 'all' || inputs.scope == 'frontend'
        working-directory: frontend
        run: pnpm lint

      - name: 前端 TypeScript 类型检查
        if: github.event_name == 'pull_request' || inputs.scope == 'all' || inputs.scope == 'frontend'
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: 后端 ESLint 检查
        if: github.event_name == 'pull_request' || inputs.scope == 'all' || inputs.scope == 'backend'
        working-directory: backend
        run: pnpm lint

      - name: 后端 TypeScript 类型检查
        if: github.event_name == 'pull_request' || inputs.scope == 'all' || inputs.scope == 'backend'
        working-directory: backend
        run: pnpm exec tsc --noEmit
