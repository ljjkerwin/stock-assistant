name: 构建

on:
  workflow_dispatch:

jobs:
  build:
    name: 构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: 安装后端依赖
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: 构建后端
        working-directory: backend
        run: pnpm build

      - name: 安装前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        working-directory: frontend
        run: pnpm build

      - name: 整合产物
        run: |
          mkdir -p release/backend release/frontend
          cp -r backend/dist backend/package.json backend/pnpm-lock.yaml release/backend/
          cp -r frontend/dist release/frontend/

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: release/
          retention-days: 30

      - name: 输出 Run ID
        run: |
          echo "## 构建产物 Run ID" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
